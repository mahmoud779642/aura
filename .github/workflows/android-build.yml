name: AuraCam CI/CD Cloud Build

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: # Allows manual trigger of builds from the GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
        cache: 'gradle' # Automatically caches Gradle downloads to reduce build time

    - name: Set up Android SDK
      uses: android-actions/setup-android@v3

    - name: Install Android NDK & CMake
      run: |
        sdkmanager --install "ndk;25.1.8937393" "cmake;3.22.1"

    - name: Grant Execute Permissions
      run: chmod +x gradlew

    - name: Build Debug & Release APKs
      run: ./gradlew assembleDebug assembleRelease

    - name: Upload Compiled Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: AuraCam-Debug-APK
        path: app/build/outputs/apk/debug/app-debug.apk

    - name: Upload Compiled Release APK (Unsigned)
      uses: actions/upload-artifact@v4
      with:
        name: AuraCam-Release-Unsigned-APK
        path: app/build/outputs/apk/release/app-release-unsigned.apk
